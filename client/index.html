<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#020617" />
    <script>
      (function() {
        // ULTRA-ROBUST RESCUE: Plain ES5 for maximum compatibility
        console.log('Rescue process started...');
        
        function clearSW() {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for (var i = 0; i < regs.length; i++) {
                regs[i].unregister().then(function() { console.log('SW Unregistered'); });
              }
            }).catch(function(e) { console.error('SW Error:', e); });
          }
        }

        function clearCaches() {
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (var i = 0; i < names.length; i++) {
                caches.delete(names[i]).then(function() { console.log('Cache Deleted'); });
              }
            }).catch(function(e) { console.error('Cache Error:', e); });
          }
        }

        clearSW();
        clearCaches();

        // FAILSAFE: Show manual reset if still loading after 8s
        setTimeout(function() {
          var loaderText = document.getElementById('loader-status');
          if (loaderText) {
            loaderText.innerHTML = 'Pemuatan melambat... <br/><a href="#" onclick="window.location.reload(true)" style="color: #3b82f6; text-decoration: underline; display: block; margin-top: 10px;">Klik di sini untuk Reset Paksa</a>';
          }
        }, 8000);

        window.onerror = function(msg, url, line, col, err) {
          var root = document.getElementById('root');
          if (root) {
            root.innerHTML = '<div style="padding: 30px; color: #b91c1c; font-family: sans-serif; text-align: center;">' +
              '<h3>Gagal Memuat Aplikasi</h3>' +
              '<p style="font-size: 13px;">' + (msg || 'Error tidak dikenal') + '</p>' +
              '<button onclick="localStorage.clear(); sessionStorage.clear(); window.location.reload(true);" style="margin-top: 20px; padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px;">BERSIHKAN SEMUA & COBA LAGI</button>' +
              '</div>';
          }
          return false;
        };
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #64748b; background: #f8fafc;">
      <div style="text-align: center;">
        <div style="width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px auto;"></div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        <p id="loader-status" style="font-weight: 500;">Memuat aplikasi...</p>
        <p style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Harap tunggu sebentar</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
