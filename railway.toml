[build]
builder = "nixpacks"
installCommand = "npm install"
buildCommand = "npm run build"

[build.environment]
NIXPACKS_NODE_VERSION = "20"
NODE_VERSION = "20"

[deploy]
startCommand = "npm start"
healthCheckPath = "/api/ping"
healthCheckTimeout = 100
restartPolicy = "always"
# Trigger redeploy: 2026-04-22 18:50
